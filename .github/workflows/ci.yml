name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  public-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Check public repository boundary
        run: ./scripts/check-public-boundary.sh

      - name: Check public repository boundary with PowerShell
        shell: pwsh
        run: ./scripts/check-public-boundary.ps1

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          dotnet-version: 8.0.x

      - name: Build and package
        shell: pwsh
        run: ./scripts/dev.ps1 -Configuration Release -Package
