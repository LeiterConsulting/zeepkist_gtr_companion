name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  public-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check public repository boundary
        run: ./scripts/check-public-boundary.sh

      - name: Check public repository boundary with PowerShell
        shell: pwsh
        run: ./scripts/check-public-boundary.ps1

  api-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 24

      - name: Validate OpenAPI contract
        run: npx --yes @redocly/cli@2.39.0 lint contracts/v1/openapi.yaml

      - name: Validate AsyncAPI contract
        run: npx --yes @asyncapi/cli@6.0.2 validate contracts/v1/asyncapi.yaml

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 8.0.x

      - name: Build and package
        shell: pwsh
        run: ./scripts/dev.ps1 -Configuration Release -Package
